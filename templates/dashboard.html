<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SENTINEL // Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <nav class="nav">
    <div class="brand">
      <span class="brand-dot"></span>
      SENTINEL&nbsp;AI
    </div>
    <div class="nav-links">
      <a href="/">LIVE</a>
      <a href="/dashboard" class="active">DASHBOARD</a>
    </div>
  </nav>

  <div class="page">

    <!-- STATS -->
    <div class="stats" id="statsRow">
      <div class="stat">
        <div class="stat-label">Total Detections</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Defective</div>
        <div class="stat-value" id="statDefective" style="color:var(--red)">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Perfect</div>
        <div class="stat-value" id="statPerfect" style="color:var(--accent)">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pending Review</div>
        <div class="stat-value" id="statPending">0</div>
      </div>
    </div>

    <div class="dashboard-layout">

      <!-- LEFT: DETAIL PANEL -->
      <div class="panel">
        <div class="panel-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="var(--accent)" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span class="panel-title">Detection Detail</span>
          <span id="detailStatus" style="margin-left:auto;"></span>
        </div>
        <div class="panel-body" id="detailBody">

          <div class="detail-placeholder" id="detailEmpty">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <p>SELECT A DETECTION TO INSPECT</p>
          </div>

          <div id="detailFilled" style="display:none;">
            <div class="detail-meta" id="metaTable"></div>
            <div class="detail-images" id="detailImages"></div>
            <div class="actions">
              <button class="btn-accept" onclick="handleDecision('accept')">✔ ACCEPT</button>
              <button class="btn-reject" onclick="handleDecision('reject')">✖ REJECT</button>
            </div>
          </div>

        </div>
      </div>

      <!-- RIGHT: LIST PANEL -->
      <div class="panel">
        <div class="panel-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="var(--accent)" stroke-width="2">
            <line x1="8"  y1="6"  x2="21" y2="6"/>
            <line x1="8"  y1="12" x2="21" y2="12"/>
            <line x1="8"  y1="18" x2="21" y2="18"/>
            <line x1="3"  y1="6"  x2="3.01" y2="6"/>
            <line x1="3"  y1="12" x2="3.01" y2="12"/>
            <line x1="3"  y1="18" x2="3.01" y2="18"/>
          </svg>
          <span class="panel-title">Recent Detections</span>
          <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
            <span id="listCount" style="
              font-family:var(--mono);font-size:10px;
              color:var(--muted);letter-spacing:1px;">0 ITEMS</span>
            <button id="rejectAllBtn" onclick="rejectAll()" style="
              padding:4px 12px;
              font-family:var(--mono);font-size:10px;letter-spacing:1px;
              text-transform:uppercase;cursor:pointer;
              background:transparent;color:var(--red);
              border:1px solid rgba(255,61,90,0.4);border-radius:3px;
              transition:all 0.2s;display:none;"
              onmouseover="this.style.background='var(--red)';this.style.color='white';"
              onmouseout="this.style.background='transparent';this.style.color='var(--red)';">
              ✖ REJECT ALL
            </button>
          </div>
        </div>
        <div class="panel-body" style="padding:12px;">
          <ul class="detection-list" id="detectionList">
            <li style="padding:40px 0;text-align:center;font-family:var(--mono);
                       font-size:11px;letter-spacing:2px;color:var(--muted);">
              AWAITING DETECTIONS…
            </li>
          </ul>
        </div>
      </div>

    </div>
  </div>

  <script>
    let detections = [];
    let selectedId = null;

    // ── Fetch loop ────────────────────────────────────────────────
    function fetchDetections() {
      fetch("/api/detections")
        .then(r => r.json())
        .then(data => {
          detections = data;
          renderList();
          updateStats();
          if (selectedId) {
            const match = detections.find(d => d.id === selectedId);
            if (match) renderDetail(match);
            else clearDetail();
          }
        })
        .catch(console.error);
    }

    setInterval(fetchDetections, 2000);
    fetchDetections();

    // ── Stats ─────────────────────────────────────────────────────
    function updateStats() {
      const pending   = detections.filter(d => d.status  === "pending").length;
      const defective = detections.filter(d => d.result  === "defective").length;
      const perfect   = detections.filter(d => d.result  === "perfect").length;

      document.getElementById("statTotal").textContent    = detections.length;
      document.getElementById("statDefective").textContent = defective;
      document.getElementById("statPerfect").textContent   = perfect;
      document.getElementById("statPending").textContent   = pending;

      document.getElementById("rejectAllBtn").style.display =
        pending > 0 ? "inline-block" : "none";
    }

    // ── Reject All ────────────────────────────────────────────────
    function rejectAll() {
      if (!confirm("Reject and delete ALL pending detections?")) return;
      fetch("/api/decision/reject_all", { method: "POST" })
        .then(r => r.json())
        .then(() => {
          detections = detections.filter(d => d.status !== "pending");
          clearDetail();
          renderList();
          updateStats();
        })
        .catch(console.error);
    }

    // ── List ──────────────────────────────────────────────────────
    function renderList() {
      const ul = document.getElementById("detectionList");
      document.getElementById("listCount").textContent = `${detections.length} ITEMS`;

      if (detections.length === 0) {
        ul.innerHTML = `<li style="padding:40px 0;text-align:center;
          font-family:var(--mono);font-size:11px;letter-spacing:2px;
          color:var(--muted);">AWAITING DETECTIONS…</li>`;
        return;
      }

      ul.innerHTML = detections.map(d => {
        let resultText = "PROCESSING";
        let resultColor = "var(--muted)";

        if (d.result === "defective") {
          resultText = "DEFECTIVE";
          resultColor = "var(--red)";
        } else if (d.result === "perfect") {
          resultText = "PERFECT";
          resultColor = "var(--accent)";
}        const angleLabel  = (d.angle || "").toUpperCase();

        return `
        <li class="detection-item 
  ${d.id === selectedId ? "active" : ""} 
  ${d.status === "accepted" ? "accepted" : ""} 
  ${d.result === null ? "processing" : ""}"
            onclick="selectDetection('${d.id}')">

          ${d.crop_url
            ? `<img class="di-thumb" src="${d.crop_url}" alt="thumb"
                    onerror="this.style.display='none'" />`
            : `<div class="di-thumb" style="display:flex;align-items:center;justify-content:center;">
                 <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                      stroke="var(--muted)" stroke-width="1.5">
                   <rect x="2" y="2" width="20" height="20" rx="2"/>
                   <circle cx="12" cy="10" r="3"/>
                   <path d="M6 21v-1a6 6 0 0112 0v1"/>
                 </svg>
               </div>`
          }

          <div class="di-info">
            <div class="di-class" style="color:${resultColor}">
              ${resultText}
            </div>
            <div class="di-meta">
              CAM ${d.camera_id}
              ${angleLabel ? `&nbsp;·&nbsp; ${angleLabel}` : ""}
              &nbsp;·&nbsp; ${d.timestamp}
            </div>
          </div>

          <div>
            <div class="di-conf">${(d.confidence * 100).toFixed(1)}%</div>
            <div style="margin-top:4px;">
              ${d.status === "accepted"
                ? `<span class="tag tag-accepted">✔ OK</span>`
                : `<span class="tag tag-pending">● PEND</span>`
              }
            </div>
          </div>
        </li>`;
      }).join("");
    }

    // ── Select ────────────────────────────────────────────────────
    function selectDetection(id) {
      selectedId = id;
      const d = detections.find(x => x.id === id);
      if (d) renderDetail(d);
      renderList();
    }

    function renderDetail(d) {
      document.getElementById("detailEmpty").style.display  = "none";
      document.getElementById("detailFilled").style.display = "block";

      // Review status badge
      document.getElementById("detailStatus").innerHTML =
        d.status === "accepted"
          ? `<span class="tag tag-accepted">✔ ACCEPTED</span>`
          : `<span class="tag tag-pending">● PENDING</span>`;

      // ── Meta table: includes both stage-1 and stage-2 results ───
let resultText = "PROCESSING";
let resultColor = "var(--muted)";

if (d.result === "defective") {
  resultText = "DEFECTIVE";
  resultColor = "var(--red)";
} else if (d.result === "perfect") {
  resultText = "PERFECT";
  resultColor = "var(--accent)";
}
      const rows = [
        ["CLASS",              "CAN"],
        ["ANGLE",              (d.angle  || "—").toUpperCase()],
        ["RESULT", `<span style="color:${resultColor};font-weight:700">
                      ${resultText}
                    </span>`],
        // ── Stage 1 ──
        ["DETECT CONF",        `${(d.confidence * 100).toFixed(1)}%`],
        // ── Stage 2 (crop classifier) ──
        ["CLASSIFIER LABEL", d.cls_label
          ? d.cls_label.toUpperCase()
          : "<span style='color:var(--muted)'>PROCESSING...</span>"
        ],
        ["CLASSIFIER CONF", d.cls_confidence != null
          ? `${(d.cls_confidence * 100).toFixed(1)}%`
          : "<span style='color:var(--muted)'>...</span>"
        ],
        ["CAMERA",             `CAM ${d.camera_id}`],
        ["TIMESTAMP",          d.timestamp],
        ["REVIEW STATUS",      d.status.toUpperCase()],
      ];

      document.getElementById("metaTable").innerHTML = rows.map(([k, v]) => `
        <div class="meta-row">
          <span class="meta-key">${k}</span>
          <span class="meta-val">${v}</span>
        </div>
      `).join("");

      // ── Images: crop (stage-2 input) + full frame ──────────────
      const imgs = [];
      if (d.crop_url)  imgs.push({ url: d.crop_url,  label: "CROP (CLASSIFIER INPUT)" });
      if (d.frame_url) imgs.push({ url: d.frame_url, label: "FULL FRAME" });

      document.getElementById("detailImages").innerHTML = imgs.map(img => `
        <div class="img-box">
          <img src="${img.url}" alt="${img.label}"
               onerror="this.parentElement.innerHTML='<div class=img-placeholder>NO SIGNAL</div>'" />
          <span class="img-box-label">${img.label}</span>
        </div>
      `).join("");
    }

    function clearDetail() {
      selectedId = null;
      document.getElementById("detailEmpty").style.display  = "flex";
      document.getElementById("detailFilled").style.display = "none";
      document.getElementById("detailStatus").innerHTML = "";
    }

    // ── Decision ──────────────────────────────────────────────────
    function handleDecision(decision) {
      if (!selectedId) return;

      fetch("/api/decision", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: selectedId, decision })
      })
      .then(r => r.json())
      .then(() => {
        if (decision === "reject") {
          detections = detections.filter(d => d.id !== selectedId);
          clearDetail();
        } else {
          detections = detections.map(d =>
            d.id === selectedId ? { ...d, status: "accepted" } : d
          );
          const updated = detections.find(d => d.id === selectedId);
          if (updated) renderDetail(updated);
        }
        renderList();
        updateStats();
      })
      .catch(console.error);
    }
  </script>

</body>
</html>
